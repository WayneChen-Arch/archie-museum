<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>安迟美术馆 · Anchi Art Museum</title>
    <style>
      :root {
        --bg: #8f8f8d;
        --bg-deep: #7a7a78;
        --wall: #949492;
        --floor: #727270;
        --text: #c4c4c1;
        --text-strong: #e4e4e1;
        --shadow: rgba(0, 0, 0, 0.28);
        --frame-pad: 4px;
        --frame-bg: linear-gradient(145deg, #424240 0%, #363634 100%);
        --frame-border: #2e2e2c;
        --art-h-a3: min(56vh, 540px);
        --art-h-a4: min(48vh, 420px);
        --art-h-a5: min(34vh, 300px);
        --art-h-series: min(40vh, 340px);
        --art-w-a3: min(78vw, 420px);
        --art-w-a4: min(72vw, 340px);
        --art-w-a5: min(58vw, 250px);
        --art-w-series: min(28vw, 210px);
        --stage-top: 11%;
        --stage-bottom: 32%;
        --track-gap: 10vw;
        --track-pad: 11vw;
        --series-gap: 0.55rem;
      }

      * {
        box-sizing: border-box;
      }

      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: "Helvetica Neue", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      body {
        overflow: hidden;
      }

      .museum {
        position: relative;
        height: 100vh;
        padding: 1.3rem 1.6rem 0;
        background: linear-gradient(180deg, var(--wall) 0%, var(--bg) 54%, var(--bg-deep) 100%);
      }

      .icon-btn {
        position: relative;
        z-index: 3;
        border: none;
        background: transparent;
        color: #b8b8b5;
        width: 24px;
        height: 24px;
        padding: 0;
        cursor: pointer;
        opacity: 0.8;
        transition: opacity 220ms ease, transform 220ms ease;
      }

      .icon-btn:hover {
        opacity: 1;
        transform: translateY(-1px);
      }

      .icon {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .main-stage {
        position: absolute;
        left: 0;
        right: 0;
        top: var(--stage-top);
        bottom: var(--stage-bottom);
        overflow: hidden;
        transition: opacity 420ms ease, visibility 420ms ease;
      }

      .track {
        display: flex;
        align-items: center;
        gap: var(--track-gap);
        height: 100%;
        padding: 14px var(--track-pad);
        box-sizing: border-box;
        will-change: transform;
        transition: transform 660ms cubic-bezier(0.2, 0.74, 0.23, 1);
      }

      .work-item,
      .work-series {
        display: flex;
        align-items: center;
        gap: 1.1rem;
        flex: 0 0 auto;
      }

      .work-series {
        align-items: flex-end;
      }

      .series-frames {
        display: flex;
        align-items: flex-end;
        gap: var(--series-gap);
      }

      .series-frames .frame {
        opacity: 0.78;
        transform: translateY(0);
      }

      .series-frames .frame.is-active,
      .series-frames .frame:hover {
        opacity: 1;
        transform: translateY(-4px);
        box-shadow:
          0 18px 34px rgba(0, 0, 0, 0.32),
          0 6px 14px rgba(0, 0, 0, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .frame {
        display: inline-block;
        padding: var(--frame-pad);
        background: var(--frame-bg);
        border: 1px solid var(--frame-border);
        box-shadow:
          0 14px 28px rgba(0, 0, 0, 0.28),
          0 4px 10px rgba(0, 0, 0, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        transform: none;
        transition: transform 580ms cubic-bezier(0.2, 0.74, 0.23, 1), box-shadow 580ms ease, opacity 320ms ease;
        cursor: zoom-in;
      }

      .frame img {
        display: block;
        width: auto;
        height: auto;
      }

      .frame.size-a3 img {
        max-height: var(--art-h-a3);
        max-width: var(--art-w-a3);
      }

      .frame.size-a4 img {
        max-height: var(--art-h-a4);
        max-width: var(--art-w-a4);
      }

      .frame.size-a5 img {
        max-height: var(--art-h-a5);
        max-width: var(--art-w-a5);
      }

      .frame.size-series img {
        max-height: var(--art-h-series);
        max-width: var(--art-w-series);
      }

      .work-item:hover .frame {
        transform: translateY(-4px);
        box-shadow:
          0 18px 34px rgba(0, 0, 0, 0.32),
          0 6px 14px rgba(0, 0, 0, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .series-label {
        margin-bottom: 0.35rem;
        color: #b8b8b5;
        font-size: 9px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .meta {
        width: 136px;
        font-size: 10px;
        line-height: 1.42;
        color: var(--text);
        user-select: none;
      }

      .artist {
        color: var(--text-strong);
        margin-bottom: 0.1rem;
      }

      .title {
        margin-top: 0.16rem;
      }

      .material {
        opacity: 0.85;
      }

      .fav {
        margin-bottom: 0.45rem;
        color: #b0b0ad;
      }

      .reflection-zone {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 31%;
        background: linear-gradient(180deg, rgba(122, 122, 120, 0.55) 0%, rgba(106, 106, 104, 0.88) 45%, var(--floor) 100%);
        overflow: hidden;
        transition: opacity 420ms ease, visibility 420ms ease;
      }

      .reflection-zone::before {
        content: "";
        position: absolute;
        z-index: 1;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: rgba(0, 0, 0, 0.12);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18);
        pointer-events: none;
      }

      .intro-screen {
        position: absolute;
        z-index: 2;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4.5rem 1.5rem 18vh;
        background: transparent;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 420ms ease, visibility 420ms ease;
      }

      .museum.is-intro .intro-screen {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .museum.is-intro .main-stage,
      .museum.is-intro .reflection-zone {
        opacity: 0;
        visibility: hidden;
      }

      .cover-stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.6rem;
        width: min(920px, 100%);
        text-align: center;
      }

      .cover-wall {
        position: relative;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: clamp(0.55rem, 1.4vw, 1rem);
        height: min(44vh, 400px);
        width: 100%;
        padding: 0 0.5rem;
      }

      .cover-frame {
        position: relative;
        flex: 0 0 auto;
        padding: 3px;
        background: linear-gradient(145deg, #4a4a48 0%, #2f2f2d 100%);
        border: 1px solid #232321;
        box-shadow:
          0 12px 24px rgba(0, 0, 0, 0.22),
          0 3px 8px rgba(0, 0, 0, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .cover-frame img,
      .cover-frame .blank-mat {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: #f4f2ee;
      }

      .cover-frame .blank-mat {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.45), transparent 40%),
          #f1eee8;
      }

      .cover-frame.f-a5 {
        width: min(11vw, 92px);
        height: min(15.5vw, 130px);
        align-self: flex-end;
        margin-bottom: 8%;
      }

      .cover-frame.f-a4 {
        width: min(14vw, 118px);
        height: min(19.8vw, 167px);
      }

      .cover-frame.f-a3 {
        width: min(18vw, 156px);
        height: min(25.4vw, 220px);
      }

      .cover-frame.f-tall {
        width: min(12.5vw, 104px);
        height: min(20vw, 168px);
      }

      .cover-frame:nth-child(1) {
        margin-bottom: 4%;
      }

      .cover-frame:nth-child(2) {
        margin-bottom: 0;
        transform: translateY(-6%);
      }

      .cover-frame:nth-child(3) {
        margin-bottom: 14%;
        transform: translateY(-18%);
      }

      .cover-frame:nth-child(4) {
        margin-bottom: 2%;
      }

      .cover-frame:nth-child(5) {
        margin-bottom: 7%;
        transform: translateY(-4%);
      }

      .cover-caption {
        margin: 0;
        max-width: 420px;
        color: #d0d0cd;
        font-size: 11px;
        line-height: 1.7;
      }

      .cover-caption .en {
        display: block;
        margin-top: 0.35rem;
        color: #b4b4b1;
        font-size: 10px;
        letter-spacing: 0.01em;
      }

      .enter-exhibition {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.2rem;
        padding: 0;
        border: 0;
        background: transparent;
        color: #e8e8e5;
        font: inherit;
        font-size: 11px;
        letter-spacing: 0.04em;
        cursor: pointer;
      }

      .enter-exhibition::after {
        content: "→";
        font-size: 14px;
        transition: transform 180ms ease;
      }

      .enter-exhibition:hover::after {
        transform: translateX(3px);
      }

      .reflection-track {
        display: flex;
        align-items: flex-start;
        gap: var(--track-gap);
        padding: 0 var(--track-pad);
        will-change: transform;
        transform: scaleY(-1) translateY(6%);
        transform-origin: top;
        transition: transform 660ms cubic-bezier(0.2, 0.74, 0.23, 1), filter 660ms ease;
        opacity: 0.25;
        filter: blur(9px) saturate(0.58);
        -webkit-mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.82), transparent 88%);
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.82), transparent 88%);
      }

      .reflection-track .work-item,
      .reflection-track .work-series {
        opacity: 0.86;
      }

      .reflection-track .meta {
        opacity: 0;
      }

      .reflection-track .series-frames .frame {
        opacity: 0.86;
        transform: none;
      }

      .reflection-fade {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(114, 114, 112, 0.02), rgba(100, 100, 98, 0.34) 52%, var(--floor) 100%);
        pointer-events: none;
      }

      .controls {
        position: absolute;
        z-index: 3;
        left: 1.5rem;
        right: 1.5rem;
        bottom: 1.3rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .art-label {
        position: absolute;
        z-index: 3;
        top: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        max-width: min(72vw, 520px);
        overflow: hidden;
        text-overflow: ellipsis;
        color: #b8b8b5;
        font-size: 9px;
        letter-spacing: 0.17em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .pager {
        display: flex;
        align-items: center;
        gap: 0.9rem;
        color: #c0c0bd;
        font-size: 11px;
        letter-spacing: 0.02em;
      }

      .arrow-btn {
        border: none;
        background: transparent;
        color: #b8b8b5;
        width: 22px;
        height: 22px;
        padding: 0;
        cursor: pointer;
        opacity: 0.8;
        transition: opacity 220ms ease, transform 220ms ease;
      }

      .arrow-btn:hover {
        opacity: 1;
      }

      .arrow-btn:active {
        transform: scale(0.95);
      }

      .arrow {
        width: 16px;
        height: 16px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .zoom-tools {
        display: flex;
        gap: 0.58rem;
        opacity: 0.72;
      }

      .controls-spacer {
        width: 40px;
      }

      @media (min-width: 981px) {
        .work-item,
        .work-series {
          min-width: max-content;
        }
      }

      @media (max-width: 980px) {
        :root {
          --art-h-a3: min(52vh, 480px);
          --art-h-a4: min(44vh, 380px);
          --art-h-a5: min(32vh, 270px);
          --art-h-series: min(36vh, 300px);
          --art-w-a3: min(72vw, 380px);
          --art-w-a4: min(68vw, 300px);
          --art-w-a5: min(54vw, 220px);
          --art-w-series: min(24vw, 180px);
          --stage-top: 8%;
          --stage-bottom: 33%;
          --track-gap: 8vw;
          --track-pad: 8.4vw;
          --series-gap: 0.45rem;
        }

        .meta {
          width: 120px;
        }
      }

      @media (max-width: 700px) {
        :root {
          /* Keep frame + meta inside the stage so overflow:hidden won't clip the top border */
          --art-h-a3: min(34vh, 280px);
          --art-h-a4: min(30vh, 240px);
          --art-h-a5: min(22vh, 180px);
          --art-h-series: min(24vh, 190px);
          --art-w-a3: min(82vw, 340px);
          --art-w-a4: min(78vw, 280px);
          --art-w-a5: min(62vw, 200px);
          --art-w-series: min(26vw, 118px);
          --stage-top: 10%;
          --stage-bottom: 36%;
          --track-gap: 24vw;
          --track-pad: 50vw;
          --series-gap: 0.7rem;
        }

        .museum {
          padding: 1rem 1rem 0;
        }

        .track {
          padding-top: 12px;
          padding-bottom: 12px;
        }

        .work-item,
        .work-series {
          flex-direction: column;
          align-items: center;
          gap: 0.85rem;
          text-align: center;
          max-height: 100%;
        }

        .work-item:hover .frame,
        .series-frames .frame.is-active,
        .series-frames .frame:hover {
          transform: none;
        }

        .meta {
          width: auto;
          max-width: 240px;
          font-size: 10px;
        }

        .fav {
          margin-bottom: 0.35rem;
        }

        .art-label {
          top: 1.1rem;
          font-size: 8px;
          max-width: 62vw;
        }

        .controls {
          left: 1rem;
          right: 1rem;
          bottom: 1rem;
        }

        .controls-spacer {
          width: 0;
        }

        .zoom-tools {
          display: none;
        }

        .pager {
          margin-inline: auto;
        }

        .track,
        .reflection-track {
          transition-duration: 380ms;
        }

        .intro-screen {
          padding: 4rem 1rem 20vh;
          align-items: flex-start;
          overflow-y: auto;
        }

        .cover-stage {
          gap: 1.25rem;
          margin-top: 1.5rem;
        }

        .cover-wall {
          height: min(36vh, 280px);
          gap: 0.45rem;
        }

        .cover-frame.f-a5 {
          width: min(16vw, 72px);
          height: min(22.5vw, 102px);
        }

        .cover-frame.f-a4 {
          width: min(20vw, 92px);
          height: min(28vw, 130px);
        }

        .cover-frame.f-a3 {
          width: min(26vw, 118px);
          height: min(36vw, 166px);
        }

        .cover-frame.f-tall {
          width: min(18vw, 82px);
          height: min(28vw, 128px);
        }

        .cover-caption {
          max-width: 300px;
          font-size: 10px;
        }

        .cover-caption .en {
          font-size: 9px;
        }
      }

      .preview-layer {
        position: absolute;
        inset: 0;
        z-index: 8;
        padding: 0;
        background: rgba(70, 70, 68, 0.88);
        backdrop-filter: blur(8px);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 320ms ease, visibility 320ms ease;
      }

      .museum.is-preview .preview-layer {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .museum.is-preview .main-stage,
      .museum.is-preview .reflection-zone,
      .museum.is-preview .intro-screen,
      .museum.is-preview .art-label {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .preview-close {
        position: absolute;
        top: 1.4rem;
        right: 1.5rem;
        z-index: 3;
        width: 32px;
        height: 32px;
        border: 0;
        background: transparent;
        color: #d4d4d1;
        font-size: 22px;
        line-height: 1;
        cursor: pointer;
        opacity: 0.75;
      }

      .preview-close:hover {
        opacity: 1;
      }

      .preview-side {
        position: absolute;
        z-index: 2;
        left: clamp(1.2rem, 4vw, 3.2rem);
        top: 50%;
        transform: translateY(-50%);
        width: min(260px, 26vw);
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
        max-height: min(68vh, 560px);
        min-width: 0;
      }

      .preview-meta {
        font-size: 11px;
        line-height: 1.5;
        color: #c8c8c5;
      }

      .preview-meta .artist {
        color: #f0f0ed;
        font-size: 13px;
        margin-bottom: 0.2rem;
      }

      .preview-meta .note {
        margin: 0.55rem 0 0;
        color: #b4b4b1;
        font-size: 11px;
        line-height: 1.55;
      }

      .comment-panel {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
        min-height: 0;
        flex: 1;
        padding-top: 0.65rem;
        border-top: 1px solid rgba(220, 220, 218, 0.22);
      }

      .comment-panel h2 {
        margin: 0;
        color: #d0d0cd;
        font-size: 10px;
        font-weight: 400;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .comment-list {
        flex: 1;
        min-height: 0;
        max-height: 150px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0;
        padding-right: 0.1rem;
      }

      .comment-item {
        padding: 0.4rem 0;
        border-bottom: 1px solid rgba(220, 220, 218, 0.14);
      }

      .comment-item:last-child {
        border-bottom: 0;
      }

      .comment-item .who {
        color: #e6e6e3;
        font-size: 10px;
        margin-bottom: 0.1rem;
      }

      .comment-item .body {
        margin: 0;
        color: #b4b4b1;
        font-size: 11px;
        line-height: 1.4;
        word-break: break-word;
      }

      .comment-empty {
        margin: 0;
        padding: 0.15rem 0 0.35rem;
        color: #949491;
        font-size: 10px;
      }

      .comment-form {
        display: grid;
        gap: 0.2rem;
      }

      .comment-form input,
      .comment-form textarea {
        width: 100%;
        border: 0;
        border-bottom: 1px solid rgba(220, 220, 218, 0.28);
        border-radius: 0;
        background: transparent;
        color: #efefec;
        font: inherit;
        font-size: 11px;
        padding: 0.35rem 0;
        outline: none;
        resize: none;
        box-shadow: none;
      }

      .comment-form input::placeholder,
      .comment-form textarea::placeholder {
        color: #8f8f8c;
      }

      .comment-form input:focus,
      .comment-form textarea:focus {
        border-bottom-color: rgba(236, 236, 233, 0.7);
      }

      .comment-form textarea {
        min-height: 2.4em;
        max-height: 4.8em;
        line-height: 1.45;
        field-sizing: content;
      }

      .comment-form button {
        justify-self: start;
        border: 0;
        background: transparent;
        color: #d8d8d5;
        font: inherit;
        font-size: 10px;
        letter-spacing: 0.04em;
        cursor: pointer;
        padding: 0.35rem 0 0;
        opacity: 0.8;
      }

      .comment-form button:hover {
        opacity: 1;
      }

      .preview-art {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
      }

      .preview-art .frame {
        pointer-events: auto;
        cursor: default;
        transform: none;
        box-shadow:
          0 28px 60px rgba(0, 0, 0, 0.42),
          0 10px 24px rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .preview-art .frame img {
        max-height: min(72vh, 680px);
        max-width: min(56vw, 540px);
      }

      .preview-art .frame.size-a5 img {
        max-height: min(56vh, 480px);
        max-width: min(42vw, 380px);
      }

      .preview-art .frame.size-a3 img {
        max-height: min(76vh, 720px);
        max-width: min(60vw, 580px);
      }

      .preview-art .frame.size-series img {
        max-height: min(74vh, 700px);
        max-width: min(48vw, 460px);
      }

      @media (max-width: 900px) {
        .preview-side {
          width: min(240px, 30vw);
        }

        .preview-art .frame img,
        .preview-art .frame.size-a3 img {
          max-width: min(48vw, 420px);
        }
      }

      @media (max-width: 700px) {
        .preview-layer {
          display: flex;
          flex-direction: column;
          overflow-x: hidden;
          overflow-y: auto;
          -webkit-overflow-scrolling: touch;
          padding: max(3.2rem, calc(env(safe-area-inset-top, 0px) + 2.4rem)) 0 2rem;
          box-sizing: border-box;
        }

        .preview-close {
          top: max(0.85rem, env(safe-area-inset-top, 0px));
          right: 1rem;
        }

        .preview-art {
          position: relative;
          left: auto;
          top: auto;
          transform: none;
          order: 1;
          width: 100%;
          margin: 0 auto 1.4rem;
          padding: 8px 1rem 0;
          box-sizing: border-box;
        }

        .preview-side {
          position: relative;
          left: auto;
          top: auto;
          transform: none;
          order: 2;
          width: auto;
          max-height: none;
          margin: 0 1.2rem;
          padding-top: 0.5rem;
        }

        .preview-art .frame {
          max-width: 100%;
        }

        .preview-art .frame img,
        .preview-art .frame.size-a3 img,
        .preview-art .frame.size-a5 img,
        .preview-art .frame.size-series img {
          max-height: min(42vh, 340px);
          max-width: min(78vw, 320px);
          width: auto;
          height: auto;
        }

        .comment-list {
          max-height: 120px;
        }

        .comment-form textarea {
          min-height: 2.2em;
        }
      }
    </style>
  </head>
  <body>
    <main class="museum is-intro" aria-label="线上美术馆展厅">
      <button class="icon-btn" id="homeBtn" aria-label="返回展览首页">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3.5 10.5L12 4l8.5 6.5"></path>
          <path d="M6.6 9.4V20h10.8V9.4"></path>
        </svg>
      </button>
      <div class="art-label" id="artLabel">安迟美术馆</div>

      <section class="intro-screen" id="introScreen" aria-labelledby="introTitle">
        <div class="cover-stage">
          <div class="cover-wall" aria-hidden="true">
            <div class="cover-frame f-a5">
              <img src="drawings/03-A5.jpg" alt="" />
            </div>
            <div class="cover-frame f-a3">
              <img src="drawings/05-A3.jpg" alt="" />
            </div>
            <div class="cover-frame f-tall">
              <div class="blank-mat"></div>
            </div>
            <div class="cover-frame f-a4">
              <img src="drawings/01-A4.jpg" alt="" />
            </div>
            <div class="cover-frame f-a5">
              <img src="drawings/06-thank-you-apricot.jpg" alt="" />
            </div>
          </div>
          <h1 id="introTitle" class="visually-hidden">安迟美术馆</h1>
          <p class="cover-caption">
            这里是安迟美术馆，记录了安迟从第一幅画开始的创作。
            <span class="en">This is Anchi Art Museum, recording Anchi’s creation from the first painting.</span>
          </p>
          <button class="enter-exhibition" id="enterBtn" type="button">进入展览</button>
        </div>
      </section>

      <section class="main-stage" aria-label="展品陈列">
        <div class="track" id="mainTrack"></div>
      </section>

      <section class="reflection-zone" aria-hidden="true">
        <div class="reflection-track" id="reflectionTrack"></div>
        <div class="reflection-fade"></div>
      </section>

      <footer class="controls">
        <div class="zoom-tools" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24">
            <circle cx="10.5" cy="10.5" r="5.8"></circle>
            <path d="M15 15l5.3 5.3"></path>
            <path d="M10.5 7.8v5.4M7.8 10.5h5.4"></path>
          </svg>
          <svg class="icon" viewBox="0 0 24 24">
            <circle cx="10.5" cy="10.5" r="5.8"></circle>
            <path d="M15 15l5.3 5.3"></path>
            <path d="M7.8 10.5h5.4"></path>
          </svg>
        </div>

        <div class="pager">
          <button class="arrow-btn" id="prevBtn" aria-label="上一件">
            <svg class="arrow" viewBox="0 0 24 24">
              <path d="M14.8 5.8L8.7 12l6.1 6.2"></path>
            </svg>
          </button>
          <span id="pageInfo">1/5</span>
          <button class="arrow-btn" id="nextBtn" aria-label="下一件">
            <svg class="arrow" viewBox="0 0 24 24">
              <path d="M9.2 5.8L15.3 12l-6.1 6.2"></path>
            </svg>
          </button>
        </div>

        <div class="controls-spacer" aria-hidden="true"></div>
      </footer>

      <section class="preview-layer" id="previewLayer" aria-hidden="true">
        <button class="preview-close" id="previewClose" type="button" aria-label="关闭预览">×</button>
        <aside class="preview-side">
          <div class="preview-meta" id="previewMeta"></div>
          <div class="comment-panel">
            <h2>参观评价</h2>
            <div class="comment-list" id="commentList"></div>
            <form class="comment-form" id="commentForm">
              <input id="commentName" type="text" maxlength="24" placeholder="名字（可选）" autocomplete="nickname" />
              <textarea id="commentText" maxlength="180" placeholder="写下感受…" rows="1" required></textarea>
              <button type="submit">留下 →</button>
            </form>
          </div>
        </aside>
        <div class="preview-art">
          <div class="frame" id="previewFrame">
            <img id="previewImage" src="" alt="" />
          </div>
        </div>
      </section>
    </main>

    <script>
      const works = [
        { artist: "Archie", years: "", title: "Composition on Grid", year: "2024", material: "Colored pencil on A4 paper", image: "drawings/01-A4.jpg", size: "a4", note: "方格纸上交织的彩色线条，像是一场尚未落地的梦。" },
        { artist: "Archie", years: "", title: "Loop Study", year: "2024", material: "Crayon on A4 paper", image: "drawings/02-A4.jpg", size: "a4", note: "层层叠叠的环状笔触，把玩耍的节奏留在了纸面。" },
        { artist: "Archie", years: "", title: "Scattered Forms", year: "2024", material: "Mixed media on A5 paper", image: "drawings/03-A5.jpg", size: "a5", note: "少数几个色点就撑开了整张纸的空气。" },
        { artist: "Archie", years: "", title: "Green Column", year: "2024", material: "Watercolor on A5 paper", image: "drawings/04-A5.jpg", size: "a5", note: "绿与黄叠印成一条竖直的路径，安静却有力。" },
        { artist: "Archie", years: "", title: "Candle Collage", year: "2024", material: "Clay, foil and paint on A3 paper", image: "drawings/05-A3.jpg", size: "a3", note: "黏土、箔片与颜料堆叠出烛火般的温度。" },
        {
          artist: "Archie",
          years: "(2y9m)",
          title: "Thank You Letter I · Apricot",
          year: "2026",
          material: "Paint collage on paper",
          image: "drawings/06-thank-you-apricot.jpg",
          size: "series",
          series: "thank-you-teachers",
          seriesTitle: "Thank You Letters",
          seriesLabel: "Kindergarten N · Graduation",
          panel: "I / III",
          note: "幼儿园 N 班毕业送给三位老师的感谢信之一。画面中的大字由 2 岁 9 个月的安迟 Archie 亲手写下，拼成一封写给老师的 thank you letter。"
        },
        {
          artist: "Archie",
          years: "(2y9m)",
          title: "Thank You Letter II · Blue",
          year: "2026",
          material: "Paint collage on paper",
          image: "drawings/07-thank-you-blue.jpg",
          size: "series",
          series: "thank-you-teachers",
          seriesTitle: "Thank You Letters",
          seriesLabel: "Kindergarten N · Graduation",
          panel: "II / III",
          note: "同组三联画的第二幅。天蓝与柠檬黄呼应学期里明朗的日子，字母旁印着 A for Archie、U for YOU。"
        },
        {
          artist: "Archie",
          years: "(2y9m)",
          title: "Thank You Letter III · Magenta",
          year: "2026",
          material: "Paint collage on paper",
          image: "drawings/08-thank-you-magenta.jpg",
          size: "series",
          series: "thank-you-teachers",
          seriesLabel: "Kindergarten N · Graduation",
          seriesTitle: "Thank You Letters",
          panel: "III / III",
          note: "三联感谢信的收束。玫红与荧光绿撞色，把毕业这一天的温度和孩子对三位老师的谢谢留在墙上。"
        }
      ];

      const mainTrack = document.getElementById("mainTrack");
      const reflectionTrack = document.getElementById("reflectionTrack");
      const pageInfo = document.getElementById("pageInfo");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const museum = document.querySelector(".museum");
      const homeBtn = document.getElementById("homeBtn");
      const enterBtn = document.getElementById("enterBtn");
      const artLabel = document.getElementById("artLabel");
      const previewLayer = document.getElementById("previewLayer");
      const previewClose = document.getElementById("previewClose");
      const previewMeta = document.getElementById("previewMeta");
      const previewFrame = document.getElementById("previewFrame");
      const previewImage = document.getElementById("previewImage");
      const commentList = document.getElementById("commentList");
      const commentForm = document.getElementById("commentForm");
      const commentName = document.getElementById("commentName");
      const commentText = document.getElementById("commentText");

      let current = 0;
      let touchStartX = 0;
      let touchStartY = 0;
      let suppressClickUntil = 0;
      let pagingLockedUntil = 0;
      let previewIndex = null;

      function commentKey(index) {
        return `archie-museum-comments-${works[index].image}`;
      }

      function loadComments(index) {
        try {
          return JSON.parse(localStorage.getItem(commentKey(index))) || [];
        } catch (error) {
          return [];
        }
      }

      function saveComments(index, comments) {
        localStorage.setItem(commentKey(index), JSON.stringify(comments));
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function renderComments(index) {
        const comments = loadComments(index);
        if (!comments.length) {
          commentList.innerHTML = `<p class="comment-empty">还没有评价</p>`;
          return;
        }

        commentList.innerHTML = comments
          .map(
            (item) => `
              <article class="comment-item">
                <div class="who">${escapeHtml(item.name || "一位参观者")}</div>
                <p class="body">${escapeHtml(item.text)}</p>
              </article>
            `
          )
          .join("");
      }

      function openPreview(index) {
        if (museum.classList.contains("is-intro")) return;
        const work = works[index];
        previewIndex = index;
        current = index;
        updateView();

        const seriesLine = work.series
          ? `<div class="material">${work.seriesLabel || "Series"} · ${work.panel || ""}</div>`
          : "";
        previewMeta.innerHTML = `
          <div class="fav">&#9825;</div>
          <div class="artist">${work.artist}${work.years ? ` ${work.years}` : ""}</div>
          <div class="title">${work.title}, ${work.year}</div>
          <div class="material">${work.material}</div>
          ${seriesLine}
          <p class="note">${work.note || ""}</p>
        `;
        previewFrame.className = `frame size-${work.size}`;
        previewImage.src = work.image;
        previewImage.alt = `${work.title}, ${work.year}`;
        renderComments(index);
        museum.classList.add("is-preview");
        previewLayer.setAttribute("aria-hidden", "false");
        // Avoid auto-focus on touch phones — keyboard covers the page and traps paging.
        if (window.matchMedia("(hover: hover) and (pointer: fine)").matches) {
          commentText.focus();
        }
      }

      function closePreview() {
        museum.classList.remove("is-preview");
        previewLayer.setAttribute("aria-hidden", "true");
        previewIndex = null;
      }

      function createSoloItem(work, index, clickable) {
        const item = document.createElement("article");
        item.className = "work-item";
        item.dataset.workIndex = String(index);
        item.innerHTML = `
          <div class="frame size-${work.size}" ${clickable ? `data-preview-index="${index}"` : ""}>
            <img src="${work.image}" alt="${work.title}, ${work.year}" loading="lazy" />
          </div>
          <div class="meta">
            <div class="fav">&#9825;</div>
            <div class="artist">${work.artist}${work.years ? ` ${work.years}` : ""}</div>
            <div class="title">${work.title}, ${work.year}</div>
            <div class="material">${work.material}</div>
          </div>
        `;
        return item;
      }

      function createSeriesItem(seriesWorks, clickable) {
        const item = document.createElement("article");
        item.className = "work-series";
        item.dataset.series = seriesWorks[0].work.series;
        const first = seriesWorks[0].work;
        const frames = seriesWorks
          .map(
            ({ work, index }) => `
              <div class="frame size-${work.size}" data-work-index="${index}" ${clickable ? `data-preview-index="${index}"` : ""}>
                <img src="${work.image}" alt="${work.title}, ${work.year}" loading="lazy" />
              </div>
            `
          )
          .join("");

        item.innerHTML = `
          <div class="series-frames">${frames}</div>
          <div class="meta">
            <div class="fav">&#9825;</div>
            <div class="series-label">${first.seriesLabel || "Series"}</div>
            <div class="artist">${first.artist}${first.years ? ` ${first.years}` : ""}</div>
            <div class="title">${first.seriesTitle || first.title}, ${first.year}</div>
            <div class="material">${first.material} · ${seriesWorks.length} panels</div>
            <div class="material series-panel" data-series-panel></div>
          </div>
        `;
        return item;
      }

      function buildDisplayUnits() {
        const units = [];
        let i = 0;
        while (i < works.length) {
          const work = works[i];
          if (work.series) {
            const seriesWorks = [];
            const seriesId = work.series;
            while (i < works.length && works[i].series === seriesId) {
              seriesWorks.push({ work: works[i], index: i });
              i += 1;
            }
            units.push({ type: "series", seriesWorks });
          } else {
            units.push({ type: "solo", work, index: i });
            i += 1;
          }
        }
        return units;
      }

      const displayUnits = buildDisplayUnits();
      const indexToUnit = new Map();

      displayUnits.forEach((unit) => {
        const mainItem =
          unit.type === "series"
            ? createSeriesItem(unit.seriesWorks, true)
            : createSoloItem(unit.work, unit.index, true);
        const reflectionItem =
          unit.type === "series"
            ? createSeriesItem(unit.seriesWorks, false)
            : createSoloItem(unit.work, unit.index, false);

        mainTrack.appendChild(mainItem);
        reflectionTrack.appendChild(reflectionItem);

        if (unit.type === "series") {
          unit.seriesWorks.forEach(({ index }) => indexToUnit.set(index, mainItem));
          mainItem.querySelectorAll("img").forEach((img) => img.addEventListener("load", scheduleViewRefresh));
          mainItem.querySelectorAll("[data-preview-index]").forEach((frame) => {
            frame.addEventListener("click", (event) => {
              if (Date.now() < suppressClickUntil) {
                event.preventDefault();
                event.stopPropagation();
                return;
              }
              openPreview(Number(frame.dataset.previewIndex));
            });
          });
        } else {
          indexToUnit.set(unit.index, mainItem);
          mainItem.querySelector("img").addEventListener("load", scheduleViewRefresh);
          mainItem.querySelector(".frame").addEventListener("click", (event) => {
            if (Date.now() < suppressClickUntil) {
              event.preventDefault();
              event.stopPropagation();
              return;
            }
            openPreview(unit.index);
          });
        }
      });

      function getFocusFrame(workIndex) {
        const item = indexToUnit.get(workIndex);
        if (!item) return null;
        return (
          item.querySelector(`.frame[data-work-index="${workIndex}"]`) ||
          item.querySelector(".frame")
        );
      }

      function readTranslateX(el) {
        const match = /translateX\((-?[\d.]+)px\)/.exec(el.style.transform || "");
        return match ? Number(match[1]) : 0;
      }

      function getCenterOffset(workIndex) {
        const stage = mainTrack.parentElement;
        const focus = getFocusFrame(workIndex);
        if (!focus) return 0;

        const stageRect = stage.getBoundingClientRect();
        const focusRect = focus.getBoundingClientRect();
        const currentT = readTranslateX(mainTrack);
        const naturalLeft = focusRect.left - stageRect.left - currentT;
        return stageRect.width / 2 - naturalLeft - focusRect.width / 2;
      }

      let refreshTimer = 0;
      function scheduleViewRefresh() {
        if (museum.classList.contains("is-intro")) return;
        window.clearTimeout(refreshTimer);
        refreshTimer = window.setTimeout(() => updateView(), 48);
      }

      function updateView() {
        if (museum.classList.contains("is-intro")) return;

        const work = works[current];
        const item = indexToUnit.get(current);
        if (!item || !work) return;

        const offset = getCenterOffset(current);
        mainTrack.style.transform = `translateX(${offset}px)`;
        reflectionTrack.style.transform = `scaleY(-1) translate(${offset}px, 6%)`;
        pageInfo.textContent = `${current + 1}/${works.length}`;
        artLabel.textContent = `安迟美术馆 — ${work.seriesTitle || work.title}`;

        mainTrack.querySelectorAll(".series-frames .frame").forEach((frame) => {
          frame.classList.toggle("is-active", Number(frame.dataset.workIndex) === current);
        });
        reflectionTrack.querySelectorAll(".series-frames .frame").forEach((frame) => {
          frame.classList.toggle("is-active", Number(frame.dataset.workIndex) === current);
        });

        if (work.series) {
          const panelText = work.panel ? `Panel ${work.panel}` : "";
          item.querySelectorAll("[data-series-panel]").forEach((node) => {
            node.textContent = panelText ? `${panelText} · ${work.title}` : work.title;
          });
        }
      }

      function showIntroduction() {
        closePreview();
        museum.classList.add("is-intro");
        pageInfo.textContent = "Introduction";
        artLabel.textContent = "安迟美术馆";
      }

      function showExhibition() {
        museum.classList.remove("is-intro");
        updateView();
      }

      function goPrev() {
        if (museum.classList.contains("is-preview")) return;
        if (museum.classList.contains("is-intro")) return;
        if (Date.now() < pagingLockedUntil) return;
        if (current === 0) {
          showIntroduction();
          return;
        }
        current -= 1;
        pagingLockedUntil = Date.now() + 320;
        updateView();
      }

      function goNext() {
        if (museum.classList.contains("is-preview")) return;
        if (museum.classList.contains("is-intro")) {
          showExhibition();
          return;
        }
        if (Date.now() < pagingLockedUntil) return;
        current = (current + 1) % works.length;
        pagingLockedUntil = Date.now() + 320;
        updateView();
      }

      prevBtn.addEventListener("click", goPrev);
      nextBtn.addEventListener("click", goNext);

      homeBtn.addEventListener("click", showIntroduction);
      enterBtn.addEventListener("click", showExhibition);
      previewClose.addEventListener("click", closePreview);
      previewLayer.addEventListener("click", (event) => {
        if (event.target === previewLayer) closePreview();
      });

      commentForm.addEventListener("submit", (event) => {
        event.preventDefault();
        if (previewIndex === null) return;
        const text = commentText.value.trim();
        if (!text) return;

        const comments = loadComments(previewIndex);
        comments.unshift({
          name: commentName.value.trim(),
          text,
          at: Date.now()
        });
        saveComments(previewIndex, comments.slice(0, 40));
        commentText.value = "";
        renderComments(previewIndex);
      });

      window.addEventListener("resize", () => {
        if (!museum.classList.contains("is-intro") && !museum.classList.contains("is-preview")) {
          scheduleViewRefresh();
        }
      });

      const mainStage = document.querySelector(".main-stage");
      mainStage.addEventListener(
        "touchstart",
        (event) => {
          touchStartX = event.changedTouches[0].clientX;
          touchStartY = event.changedTouches[0].clientY;
        },
        { passive: true }
      );
      mainStage.addEventListener(
        "touchend",
        (event) => {
          if (museum.classList.contains("is-intro") || museum.classList.contains("is-preview")) return;
          const touch = event.changedTouches[0];
          const deltaX = touch.clientX - touchStartX;
          const deltaY = touch.clientY - touchStartY;
          if (Math.abs(deltaX) < 40 || Math.abs(deltaX) < Math.abs(deltaY)) return;
          suppressClickUntil = Date.now() + 450;
          if (deltaX < 0) goNext();
          else goPrev();
        },
        { passive: true }
      );
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && museum.classList.contains("is-preview")) {
          closePreview();
          return;
        }
        if (museum.classList.contains("is-preview")) return;
        if (event.key === "ArrowLeft") goPrev();
        if (event.key === "ArrowRight") goNext();
      });
      showIntroduction();
    </script>
  </body>
</html>
