<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archie Museum</title>
    <style>
      :root {
        --bg: #8f8f8d;
        --bg-deep: #7a7a78;
        --wall: #949492;
        --floor: #727270;
        --text: #c4c4c1;
        --text-strong: #e4e4e1;
        --shadow: rgba(0, 0, 0, 0.28);
        --frame-pad: 4px;
        --frame-bg: linear-gradient(145deg, #424240 0%, #363634 100%);
        --frame-border: #2e2e2c;
        --art-max-h: min(48vh, 460px);
        --stage-top: 11%;
        --stage-bottom: 32%;
        --track-gap: 10vw;
        --track-pad: 11vw;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        font-family: "Helvetica Neue", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      body {
        overflow: hidden;
      }

      .museum {
        position: relative;
        height: 100vh;
        padding: 1.3rem 1.6rem 0;
        background: linear-gradient(180deg, var(--wall) 0%, var(--bg) 54%, var(--bg-deep) 100%);
      }

      .icon-btn {
        position: relative;
        z-index: 3;
        border: none;
        background: transparent;
        color: #b8b8b5;
        width: 24px;
        height: 24px;
        padding: 0;
        cursor: pointer;
        opacity: 0.8;
        transition: opacity 220ms ease, transform 220ms ease;
      }

      .icon-btn:hover {
        opacity: 1;
        transform: translateY(-1px);
      }

      .icon {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .main-stage {
        position: absolute;
        left: 0;
        right: 0;
        top: var(--stage-top);
        bottom: var(--stage-bottom);
        overflow: hidden;
        transition: opacity 420ms ease, visibility 420ms ease;
      }

      .track {
        display: flex;
        align-items: center;
        gap: var(--track-gap);
        height: 100%;
        padding: 0 var(--track-pad);
        will-change: transform;
        transition: transform 660ms cubic-bezier(0.2, 0.74, 0.23, 1);
      }

      .work-item {
        display: flex;
        align-items: center;
        gap: 1.1rem;
        flex: 0 0 auto;
      }

      .frame {
        display: inline-block;
        padding: var(--frame-pad);
        background: var(--frame-bg);
        border: 1px solid var(--frame-border);
        box-shadow:
          0 14px 28px rgba(0, 0, 0, 0.28),
          0 4px 10px rgba(0, 0, 0, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        transform: translateY(-1px);
        transition: transform 580ms cubic-bezier(0.2, 0.74, 0.23, 1), box-shadow 580ms ease;
      }

      .frame img {
        display: block;
        max-height: var(--art-max-h);
        max-width: min(72vw, 520px);
        width: auto;
        height: auto;
      }

      .work-item:hover .frame {
        transform: translateY(-4px);
        box-shadow:
          0 18px 34px rgba(0, 0, 0, 0.32),
          0 6px 14px rgba(0, 0, 0, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .meta {
        width: 136px;
        font-size: 10px;
        line-height: 1.42;
        color: var(--text);
        user-select: none;
      }

      .artist {
        color: var(--text-strong);
        margin-bottom: 0.1rem;
      }

      .title {
        margin-top: 0.16rem;
      }

      .material {
        opacity: 0.85;
      }

      .fav {
        margin-bottom: 0.45rem;
        color: #b0b0ad;
      }

      .reflection-zone {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 31%;
        background: linear-gradient(180deg, rgba(122, 122, 120, 0.55) 0%, rgba(106, 106, 104, 0.88) 45%, var(--floor) 100%);
        overflow: hidden;
        transition: opacity 420ms ease, visibility 420ms ease;
      }

      .reflection-zone::before {
        content: "";
        position: absolute;
        z-index: 1;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: rgba(0, 0, 0, 0.12);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18);
        pointer-events: none;
      }

      .intro-screen {
        position: absolute;
        z-index: 2;
        inset: 0;
        display: grid;
        grid-template-columns: minmax(260px, 360px) minmax(180px, 250px);
        align-content: center;
        justify-content: center;
        gap: clamp(3rem, 10vw, 11rem);
        padding: 4rem 9vw 34vh;
        background: transparent;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: opacity 420ms ease, visibility 420ms ease;
      }

      .museum.is-intro .intro-screen {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .museum.is-intro .main-stage,
      .museum.is-intro .reflection-zone {
        opacity: 0;
        visibility: hidden;
      }

      .intro-copy {
        align-self: center;
        max-width: 350px;
      }

      .intro-kicker {
        margin: 0 0 1rem;
        color: #a8a8a5;
        font-size: 9px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .intro-copy h1 {
        margin: 0 0 0.5rem;
        color: #ececea;
        font-weight: 400;
        font-size: clamp(25px, 2.5vw, 38px);
        letter-spacing: -0.045em;
      }

      .intro-dates {
        margin: 0 0 1.25rem;
        font-size: 10px;
        color: #b8b8b5;
      }

      .intro-copy p:not(.intro-kicker):not(.intro-dates) {
        max-width: 310px;
        margin: 0;
        color: #b0b0ad;
        font-size: 11px;
        line-height: 1.55;
      }

      .enter-exhibition {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1.5rem;
        padding: 0;
        border: 0;
        background: transparent;
        color: #c8c8c5;
        font: inherit;
        font-size: 10px;
        cursor: pointer;
      }

      .enter-exhibition::after {
        content: "→";
        font-size: 14px;
        transition: transform 180ms ease;
      }

      .enter-exhibition:hover::after {
        transform: translateX(3px);
      }

      .intro-work {
        display: flex;
        align-items: center;
        gap: 0.9rem;
      }

      .intro-work .frame img,
      .intro-reflection .frame img {
        max-height: min(42vh, 380px);
        max-width: min(42vw, 320px);
      }
      .intro-work .meta {
        width: 115px;
      }

      .intro-reflection {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 32%;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding-top: 1.2rem;
        overflow: hidden;
        opacity: 0.2;
        filter: blur(8px) saturate(0.6);
        transform: scaleY(-1);
        transform-origin: top;
        pointer-events: none;
      }

      .intro-reflection::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(114, 114, 112, 0.08), var(--floor) 80%);
      }

      .reflection-track {
        display: flex;
        align-items: flex-start;
        gap: var(--track-gap);
        padding: 0 var(--track-pad);
        will-change: transform;
        transform: scaleY(-1) translateY(6%);
        transform-origin: top;
        transition: transform 660ms cubic-bezier(0.2, 0.74, 0.23, 1), filter 660ms ease;
        opacity: 0.25;
        filter: blur(9px) saturate(0.58);
        -webkit-mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.82), transparent 88%);
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.82), transparent 88%);
      }

      .reflection-track .work-item {
        opacity: 0.86;
      }

      .reflection-track .meta {
        opacity: 0;
      }

      .reflection-fade {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(114, 114, 112, 0.02), rgba(100, 100, 98, 0.34) 52%, var(--floor) 100%);
        pointer-events: none;
      }

      .controls {
        position: absolute;
        z-index: 3;
        left: 1.5rem;
        right: 1.5rem;
        bottom: 1.3rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .art-label {
        position: absolute;
        z-index: 3;
        top: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        max-width: min(72vw, 520px);
        overflow: hidden;
        text-overflow: ellipsis;
        color: #b8b8b5;
        font-size: 9px;
        letter-spacing: 0.17em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .pager {
        display: flex;
        align-items: center;
        gap: 0.9rem;
        color: #c0c0bd;
        font-size: 11px;
        letter-spacing: 0.02em;
      }

      .arrow-btn {
        border: none;
        background: transparent;
        color: #b8b8b5;
        width: 22px;
        height: 22px;
        padding: 0;
        cursor: pointer;
        opacity: 0.8;
        transition: opacity 220ms ease, transform 220ms ease;
      }

      .arrow-btn:hover {
        opacity: 1;
      }

      .arrow-btn:active {
        transform: scale(0.95);
      }

      .arrow {
        width: 16px;
        height: 16px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .zoom-tools {
        display: flex;
        gap: 0.58rem;
        opacity: 0.72;
      }

      .controls-spacer {
        width: 40px;
      }

      @media (min-width: 981px) {
        .work-item {
          min-width: max-content;
        }
      }

      @media (max-width: 980px) {
        :root {
          --art-max-h: min(44vh, 400px);
          --stage-top: 8%;
          --stage-bottom: 33%;
          --track-gap: 8vw;
          --track-pad: 8.4vw;
        }

        .meta {
          width: 120px;
        }
      }

      @media (max-width: 700px) {
        :root {
          --art-max-h: min(38vh, 300px);
          --stage-top: 7%;
          --stage-bottom: 38%;
          --track-gap: 14vw;
          --track-pad: 50vw;
        }

        .museum {
          padding: 1rem 1rem 0;
        }

        .work-item {
          flex-direction: column;
          align-items: center;
          gap: 0.85rem;
          text-align: center;
        }

        .frame img {
          max-width: min(78vw, 320px);
        }

        .meta {
          width: auto;
          max-width: 240px;
          font-size: 10px;
        }

        .fav {
          margin-bottom: 0.35rem;
        }

        .art-label {
          top: 1.1rem;
          font-size: 8px;
          max-width: 62vw;
        }

        .controls {
          left: 1rem;
          right: 1rem;
          bottom: 1rem;
        }

        .controls-spacer {
          width: 0;
        }

        .zoom-tools {
          display: none;
        }

        .pager {
          margin-inline: auto;
        }

        .intro-screen {
          grid-template-columns: 1fr;
          gap: 1.6rem;
          justify-items: center;
          padding: 4.4rem 1.25rem 36vh;
          overflow-y: auto;
        }

        .intro-copy {
          text-align: center;
        }

        .intro-copy p:not(.intro-kicker):not(.intro-dates) {
          margin-inline: auto;
        }

        .intro-work {
          flex-direction: column;
          text-align: center;
        }

        .intro-work .frame img,
        .intro-reflection .frame img {
          max-height: min(34vh, 260px);
          max-width: min(72vw, 240px);
        }

        .intro-work .meta {
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="museum is-intro" aria-label="线上美术馆展厅">
      <button class="icon-btn" id="homeBtn" aria-label="返回展览首页">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3.5 10.5L12 4l8.5 6.5"></path>
          <path d="M6.6 9.4V20h10.8V9.4"></path>
        </svg>
      </button>
      <div class="art-label" id="artLabel">Archie Museum</div>

      <section class="intro-screen" id="introScreen" aria-labelledby="introTitle">
        <div class="intro-copy">
          <p class="intro-kicker">Digital exhibition · 01</p>
          <h1 id="introTitle">Archie Museum</h1>
          <p class="intro-dates">A digital exhibition of drawings</p>
          <p>
            这是一座为儿童绘画而建的线上美术馆。作品保留纸张的留白、笔触的即兴与材料的触感，在安静的数字展厅中，让观看回到最初的好奇与想象。
          </p>
          <button class="enter-exhibition" id="enterBtn" type="button">进入展览</button>
        </div>
        <div class="intro-work" aria-label="精选作品">
          <div class="frame">
            <img src="drawings/cover.jpg" alt="Archie, Cover Study, 2024" loading="lazy" />
          </div>
          <div class="meta">
            <div class="fav">&#9825;</div>
            <div class="artist">Archie</div>
            <div class="title">Cover Study, 2024</div>
            <div class="material">Colored pencil on graph paper</div>
          </div>
        </div>
        <div class="intro-reflection" aria-hidden="true">
          <div class="frame">
            <img src="drawings/cover.jpg" alt="" loading="lazy" />
          </div>
        </div>
      </section>

      <section class="main-stage" aria-label="展品陈列">
        <div class="track" id="mainTrack"></div>
      </section>

      <section class="reflection-zone" aria-hidden="true">
        <div class="reflection-track" id="reflectionTrack"></div>
        <div class="reflection-fade"></div>
      </section>

      <footer class="controls">
        <div class="zoom-tools" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24">
            <circle cx="10.5" cy="10.5" r="5.8"></circle>
            <path d="M15 15l5.3 5.3"></path>
            <path d="M10.5 7.8v5.4M7.8 10.5h5.4"></path>
          </svg>
          <svg class="icon" viewBox="0 0 24 24">
            <circle cx="10.5" cy="10.5" r="5.8"></circle>
            <path d="M15 15l5.3 5.3"></path>
            <path d="M7.8 10.5h5.4"></path>
          </svg>
        </div>

        <div class="pager">
          <button class="arrow-btn" id="prevBtn" aria-label="上一件">
            <svg class="arrow" viewBox="0 0 24 24">
              <path d="M14.8 5.8L8.7 12l6.1 6.2"></path>
            </svg>
          </button>
          <span id="pageInfo">1/5</span>
          <button class="arrow-btn" id="nextBtn" aria-label="下一件">
            <svg class="arrow" viewBox="0 0 24 24">
              <path d="M9.2 5.8L15.3 12l-6.1 6.2"></path>
            </svg>
          </button>
        </div>

        <div class="controls-spacer" aria-hidden="true"></div>
      </footer>
    </main>

    <script>
      const works = [
        { artist: "Archie", years: "", title: "Composition on Grid", year: "2024", material: "Colored pencil on graph paper", image: "drawings/01.jpg" },
        { artist: "Archie", years: "", title: "Loop Study", year: "2024", material: "Crayon on paper", image: "drawings/02.jpg" },
        { artist: "Archie", years: "", title: "Scattered Forms", year: "2024", material: "Mixed media on paper", image: "drawings/03.jpg" },
        { artist: "Archie", years: "", title: "Green Column", year: "2024", material: "Watercolor on paper", image: "drawings/04.jpg" },
        { artist: "Archie", years: "", title: "Candle Collage", year: "2024", material: "Clay, foil and paint on paper", image: "drawings/05.jpg" }
      ];

      const mainTrack = document.getElementById("mainTrack");
      const reflectionTrack = document.getElementById("reflectionTrack");
      const pageInfo = document.getElementById("pageInfo");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const museum = document.querySelector(".museum");
      const homeBtn = document.getElementById("homeBtn");
      const enterBtn = document.getElementById("enterBtn");
      const artLabel = document.getElementById("artLabel");

      let current = 0;
      let touchStartX = 0;

      function createItem(work) {
        const item = document.createElement("article");
        item.className = "work-item";
        item.innerHTML = `
          <div class="frame">
            <img src="${work.image}" alt="${work.title}, ${work.year}" loading="lazy" />
          </div>
          <div class="meta">
            <div class="fav">&#9825;</div>
            <div class="artist">${work.artist}${work.years ? ` ${work.years}` : ""}</div>
            <div class="title">${work.title}, ${work.year}</div>
            <div class="material">${work.material}</div>
          </div>
        `;
        return item;
      }

      works.forEach((work) => {
        const mainItem = createItem(work);
        const reflectionItem = createItem(work);
        mainTrack.appendChild(mainItem);
        reflectionTrack.appendChild(reflectionItem);
        mainItem.querySelector("img").addEventListener("load", updateView);
      });

      function getCenterOffset(item) {
        const stage = mainTrack.parentElement;
        return stage.clientWidth / 2 - item.offsetLeft - item.offsetWidth / 2;
      }

      function updateView() {
        const items = mainTrack.children;
        const item = items[current];
        if (!item) return;

        const offset = getCenterOffset(item);
        mainTrack.style.transform = `translateX(${offset}px)`;
        reflectionTrack.style.transform = `scaleY(-1) translate(${offset}px, 6%)`;
        pageInfo.textContent = `${current + 1}/${works.length}`;
        artLabel.textContent = `Archie Museum — ${works[current].title}`;
      }

      function showIntroduction() {
        museum.classList.add("is-intro");
        pageInfo.textContent = "Introduction";
        artLabel.textContent = "Archie Museum";
      }

      function showExhibition() {
        museum.classList.remove("is-intro");
        updateView();
      }

      prevBtn.addEventListener("click", () => {
        if (museum.classList.contains("is-intro")) return;
        if (current === 0) {
          showIntroduction();
          return;
        }
        current -= 1;
        updateView();
      });

      nextBtn.addEventListener("click", () => {
        if (museum.classList.contains("is-intro")) {
          showExhibition();
          return;
        }
        current = (current + 1) % works.length;
        updateView();
      });

      homeBtn.addEventListener("click", showIntroduction);
      enterBtn.addEventListener("click", showExhibition);
      window.addEventListener("resize", updateView);
      mainTrack.addEventListener(
        "touchstart",
        (event) => {
          touchStartX = event.changedTouches[0].clientX;
        },
        { passive: true }
      );
      mainTrack.addEventListener(
        "touchend",
        (event) => {
          if (museum.classList.contains("is-intro")) return;
          const deltaX = event.changedTouches[0].clientX - touchStartX;
          if (Math.abs(deltaX) < 40) return;
          if (deltaX < 0) nextBtn.click();
          else prevBtn.click();
        },
        { passive: true }
      );
      window.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") prevBtn.click();
        if (event.key === "ArrowRight") nextBtn.click();
      });
      showIntroduction();
    </script>
  </body>
</html>
